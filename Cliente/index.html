<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Tienda Online</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <header>
        <h1>tu sitio de confianza</h1>
        <nav>
            <input type="text" id="buscador" placeholder="Buscar por especialidad (ej: Ropa, Hogar...)">
            <button onclick="buscar()">Buscar</button>
            <a href="#">🛒</a>
        </nav>
    </header>
    <section id="crud-formulario">
    <h3>Entrada de Datos</h3>
    <input type="text" id="prod-nombre" placeholder="Nombre del Producto">
    <input type="number" id="prod-precio" placeholder="Precio ($)">
    <input type="number" id="prod-stock" placeholder="Stock Inicial">
    <select id="prod-categoria">
        <option value="ropa">Ropa</option>
        <option value="hogar">Hogar</option>
        <option value="tecnologia">Tecnología</option>
    </select>
    <button id="btn-guardar">Guardar Producto</button>
</section>

<section id="crud-tabla">
    <table border="1">
        <thead>
            <tr>
                <th>Imagen</th>
                <th>Nombre</th>
                <th>Stock</th>
                <th>Precio</th>
                <th>Acciones</th> </tr>
        </thead>
        <tbody id="lista-productos-admin">
            </tbody>
    </table>
</section>

    <main>
        <h2>Catálogo de Productos</h2>
        <div class="contenedor-productos">
            <div class="tarjeta">
                <img src="https://via.placeholder.com/150" alt="Producto">
                <h3>Producto de Ejemplo</h3>
                <p>Especialidad: General</p>
                <span>$10.00</span>
                <button>Agregar a la canasta</button>
            </div>
        </div>
    </main>
</body>
</html>
